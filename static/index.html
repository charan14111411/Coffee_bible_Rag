<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Bible Assistant</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --green-primary: #004225;
            --green-primary-hover: #005f35;
            --green-light: #f3faf3;
            --bg-sage: #e6f3e6;
            --border-sage: #c3dcbe;
            --text-dark: #1f2a22;
            --text-muted: #5c7060;
            --accent-green: #13a032;
            --font-family: 'Lexend Deca', 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-sage);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* App Container */
        .app-container {
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            background: #ffffff;
            border: 1px solid var(--border-sage);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 66, 37, 0.08);
            z-index: 1;
            overflow: hidden;
            animation: container-fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-sage);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--green-primary);
            color: #ffffff;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 42px;
            height: 42px;
            background: #ffffff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--green-primary);
        }

        .header-title h1 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-title p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        /* Messages Container */
        .chat-body {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: #fafdfa;
            scrollbar-width: thin;
            scrollbar-color: var(--border-sage) transparent;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background-color: var(--border-sage);
            border-radius: 10px;
        }

        /* Chat Messages styling */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: message-slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0, 66, 37, 0.04);
        }

        .message.user .message-content {
            background: var(--green-primary);
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .message.assistant .message-content {
            background: var(--green-light);
            border: 1px solid var(--border-sage);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message.user .message-meta {
            justify-content: flex-end;
        }

        /* Evidence Section */
        .evidence-container {
            margin-top: 10px;
            width: 100%;
        }

        .evidence-header {
            background: #ffffff;
            border: 1px solid var(--border-sage);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            color: var(--green-primary);
        }

        .evidence-header:hover {
            background: var(--green-light);
            border-color: var(--green-primary);
        }

        .evidence-header span {
            color: var(--green-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .evidence-header i.chevron {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
        }

        .evidence-header.active i.chevron {
            transform: rotate(180deg);
            color: var(--green-primary);
        }

        .evidence-content {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            animation: slide-down 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .evidence-item {
            background: #ffffff;
            border: 1px solid var(--border-sage);
            border-left: 3px solid var(--accent-green);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.8rem;
        }

        .evidence-badge {
            background: var(--green-light);
            color: var(--green-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 4px;
            border: 1px solid var(--border-sage);
        }

        .evidence-text {
            color: var(--text-dark);
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            background: var(--green-light);
            border: 1px solid var(--border-sage);
            padding: 14px 20px;
            border-radius: 12px;
            border-bottom-left-radius: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--green-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        /* Input Area */
        .chat-input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--border-sage);
            background: #ffffff;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--green-light);
            border: 1px solid var(--border-sage);
            border-radius: 12px;
            padding: 4px 4px 4px 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-wrapper:focus-within {
            border-color: var(--green-primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 66, 37, 0.1);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-dark);
            font-family: var(--font-family);
            font-size: 0.95rem;
            padding: 10px 0;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--green-primary);
            border: none;
            outline: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--green-primary-hover);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes container-fade-in {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes message-slide-up {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slide-down {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(19, 160, 50, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(19, 160, 50, 0); }
            100% { box-shadow: 0 0 0 0 rgba(19, 160, 50, 0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .app-container {
                width: 95%;
                height: 95vh;
            }
            .message {
                max-width: 90%;
            }
            .header {
                padding: 15px 20px;
            }
            .chat-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="header-logo">
                    <i class="fa-solid fa-mug-hot"></i>
                </div>
                <div class="header-title">
                    <h1>Coffee Book Assistant</h1>
                    
                </div>
            </div>
            
            <div class="header-status">
                <div class="status-dot"></div>
                <span>Agent Online</span>
            </div>
        </header>

        <!-- Chat Pane -->
        <main class="chat-body" id="chatBody">
            <!-- Messages are appended here dynamically -->
        </main>

        <!-- Input Box -->
        <footer class="chat-input-area">
            <form id="chatForm" onsubmit="sendMessage(event)">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask something about coffee..." autocomplete="off">
                    <button type="submit" class="send-btn" id="sendBtn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script>
        const chatBody = document.getElementById('chatBody');
        const userInput = document.getElementById('userInput');
        
        // Generate a unique thread ID for the session to persist conversation memory
        const threadId = 'thread_' + Math.random().toString(36).substring(2, 11);

        // Trigger welcome message on DOM load
        window.addEventListener('DOMContentLoaded', () => {
            appendMessage('assistant', 'Hello! I am your Coffee Bible Assistant. Ask me any questions about coffee growing, processing, storage, roasting, or brewing.');
        });

        // Formats current time (e.g. "10:34 AM")
        function getFormattedTime() {
            const date = new Date();
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        }

        // Toggle Expandable Evidence
        function toggleEvidence(element) {
            element.classList.toggle('active');
            const content = element.nextElementSibling;
            if (content.style.display === 'flex') {
                content.style.display = 'none';
            } else {
                content.style.display = 'flex';
            }
        }

        // Appends a message bubble
        function appendMessage(sender, text, evidence = null) {

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            let evidenceHtml = '';
            if (evidence && evidence.length > 0) {
                const evidenceItemsHtml = evidence.map((item, index) => `
                    <div class="evidence-item">
                        <div class="evidence-badge">Source: Page ${item.page}</div>
                        <div class="evidence-text">Lines: ${item.start_line} - ${item.end_line}</div>
                    </div>
                `).join('');

                evidenceHtml = `
                    <div class="evidence-container">
                        <div class="evidence-header" onclick="toggleEvidence(this)">
                            <span><i class="fa-solid fa-book-open"></i> Sources & Graded Evidence (${evidence.length})</span>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </div>
                        <div class="evidence-content">
                            ${evidenceItemsHtml}
                        </div>
                    </div>
                `;
            }

            messageDiv.innerHTML = `
                <div class="message-content">
                    <p>${escapeHtml(text)}</p>
                    ${evidenceHtml}
                </div>
                <div class="message-meta">
                    <span>${sender === 'user' ? 'You' : 'Assistant'}</span> • <span>${getFormattedTime()}</span>
                </div>
            `;

            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Show/hide Typing Indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatBody.appendChild(indicator);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // HTML escaping helper
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // Send Message logic
        async function sendMessage(event) {
            event.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Render User Bubble
            appendMessage('user', text);
            userInput.value = '';

            // Loading state
            showTypingIndicator();

            try {
                // Call API with the session thread_id
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        question: text,
                        thread_id: threadId
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                appendMessage('assistant', data.answer, data.evidence);

            } catch (error) {
                console.error(error);
                removeTypingIndicator();
                appendMessage('assistant', 'Sorry, I encountered an error communicating with the agent server. Please make sure the backend is running.');
            }
        }
    </script>
</body>
</html>
